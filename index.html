<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hello World</title>

<style>
body {
    background: #eeeeee;
    font-family: "Times New Roman", serif;
}

/* 外框 */
.container {
    width: 650px;
    margin: 60px auto;
    padding: 25px;
    background: #f2f2f2;
    box-shadow: 0 8px 18px rgba(0,0,0,0.25);
}

.rec1 {
    background: #a3c9d7;
    font-size: 40px;
    font-weight: bold;

    border: 12px double #ff5a36;

    margin-bottom: 30px;
}

.rec2 {
    background: yellow;
    font-size: 40px;
    font-weight: bold;

    border: 4px solid rgb(1, 156, 239);
    border-radius: 15px;

    margin-bottom: 30px;
}

.rec3 {
    background: rgb(3, 179, 97);
    font-size: 40px;
    font-weight: bold;

    border: 15px dotted #7f7e7e;
}
</style>

</head>

<body>

<div class="container">
    <div class="rec1">Hello World</div>
    <div class="rec2">Hello World</div>
    <div class="rec3">Hello World</div>
</div>

</body>
</html>
